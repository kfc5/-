<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        /* 可选：简单的调试面板样式（不影响核心功能） */
        #debug-panel {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            padding: 8px 12px;
            border-radius: 6px;
            z-index: 9999;
            max-width: 300px;
            max-height: 200px;
            overflow: auto;
            display: none;
        }
        #debug-panel.show {
            display: block;
        }
    </style>
</head>
<body>
    <!-- 纯内核版本：无UI界面，静默检测，支持多种探测方式 -->
    <div id="debug-panel"></div>
    
    <script>
        (function() {
            "use strict";

            // ========== 可配置参数 ==========
            const TARGET_WEBSITES = [
                'https://qiniu.kfc.brmkweb.cn',
                'https://netlify.kfc.brmkweb.cn',
                'https://digitalocean.kfc.brmkweb.cn',
                'https://render.kfc.brmkweb.cn',
                'https://vercel.kfc.brmkweb.cn'
            ];

            const METHOD_TIMEOUT_MS = 1000;      // 每种探测方法的超时时间(ms)，增加到3秒更稳妥
            const AUTO_REDIRECT = false;          // 是否自动跳转（false=仅检测，true=跳转）
            const REDIRECT_DELAY_MS = 0;        // 跳转前延迟(ms)
            const SHOW_DEBUG_PANEL = false;        // 是否显示调试面板
            
            // ★ 最终备用网址：当所有目标网站均不可达时，直接跳转到此地址
            const FALLBACK_URL = 'https://order.kfc.com.cn/preorder-taro/home';
            // =================================

            // 调试日志工具
            const logger = {
                log: function(...args) {
                    console.log(...args);
                    if (SHOW_DEBUG_PANEL) this.addToPanel('log', args);
                },
                warn: function(...args) {
                    console.warn(...args);
                    if (SHOW_DEBUG_PANEL) this.addToPanel('warn', args);
                },
                error: function(...args) {
                    console.error(...args);
                    if (SHOW_DEBUG_PANEL) this.addToPanel('error', args);
                },
                addToPanel: function(level, args) {
                    const panel = document.getElementById('debug-panel');
                    if (!panel) return;
                    panel.classList.add('show');
                    const time = new Date().toLocaleTimeString();
                    const msg = args.map(arg => {
                        if (typeof arg === 'object') return JSON.stringify(arg);
                        return String(arg);
                    }).join(' ');
                    const div = document.createElement('div');
                    div.style.color = level === 'error' ? '#f66' : (level === 'warn' ? '#fa0' : '#0f0');
                    div.innerHTML = `[${time}] ${msg}`;
                    panel.appendChild(div);
                    panel.scrollTop = panel.scrollHeight;
                    // 保留最近50条
                    while (panel.children.length > 50) panel.removeChild(panel.firstChild);
                }
            };

            class RobustAvailabilityChecker {
                constructor(websites, methodTimeout = METHOD_TIMEOUT_MS) {
                    this.websites = websites;
                    this.methodTimeout = methodTimeout;
                    this.availableWebsites = [];
                }

                // 获取基础域名（协议+主机名）
                getBaseUrl(url) {
                    try {
                        const urlObj = new URL(url);
                        return `${urlObj.protocol}//${urlObj.host}`;
                    } catch (e) {
                        return null;
                    }
                }

                // 1. Image 探测 (使用 favicon.ico，更通用)
                testWithImage(url) {
                    return new Promise((resolve) => {
                        const img = new Image();
                        const startTime = performance.now();
                        let settled = false;
                        
                        const baseUrl = this.getBaseUrl(url);
                        if (!baseUrl) {
                            resolve({ success: false, time: null, method: 'image', error: 'invalid_url' });
                            return;
                        }
                        
                        const timer = setTimeout(() => {
                            if (!settled) {
                                settled = true;
                                cleanup();
                                resolve({ success: false, time: null, method: 'image', error: 'timeout' });
                            }
                        }, this.methodTimeout);
                        
                        const cleanup = () => {
                            img.onload = null;
                            img.onerror = null;
                        };
                        
                        img.onload = () => {
                            if (!settled) {
                                settled = true;
                                clearTimeout(timer);
                                cleanup();
                                resolve({ 
                                    success: true, 
                                    time: performance.now() - startTime, 
                                    method: 'image' 
                                });
                            }
                        };
                        
                        img.onerror = () => {
                            if (!settled) {
                                settled = true;
                                clearTimeout(timer);
                                cleanup();
                                resolve({ 
                                    success: false, 
                                    time: null, 
                                    method: 'image',
                                    error: 'load_failed'
                                });
                            }
                        };
                        
                        // 使用 favicon.ico 更通用
                        img.src = `${baseUrl}/favicon.ico?t=${Date.now()}`;
                    });
                }

                // 2. Prefetch 探测（无需CORS，适合纯静态环境）
                testWithPrefetch(url) {
                    return new Promise((resolve) => {
                        const link = document.createElement('link');
                        const cacheBuster = url.includes('?') ? '&' : '?';
                        const testUrl = url + cacheBuster + '_prefetch=' + Date.now();
                        
                        link.rel = 'prefetch';
                        link.href = testUrl;
                        link.as = 'document';
                        
                        let settled = false;
                        const startTime = performance.now();

                        const timer = setTimeout(() => {
                            if (!settled) {
                                settled = true;
                                cleanup();
                                resolve({ success: false, time: null, method: 'prefetch', error: 'timeout' });
                            }
                        }, this.methodTimeout);

                        const cleanup = () => {
                            if (link.parentNode) link.parentNode.removeChild(link);
                        };

                        link.onload = () => {
                            if (!settled) {
                                settled = true;
                                clearTimeout(timer);
                                cleanup();
                                resolve({ 
                                    success: true, 
                                    time: performance.now() - startTime, 
                                    method: 'prefetch' 
                                });
                            }
                        };

                        link.onerror = () => {
                            if (!settled) {
                                settled = true;
                                clearTimeout(timer);
                                cleanup();
                                resolve({ 
                                    success: false, 
                                    time: null, 
                                    method: 'prefetch',
                                    error: 'load_failed'
                                });
                            }
                        };

                        document.head.appendChild(link);
                    });
                }

                // 3. Fetch 探测（最精确，需要CORS支持）
                testWithFetch(url) {
                    return new Promise((resolve) => {
                        const controller = new AbortController();
                        const signal = controller.signal;
                        const startTime = performance.now();
                        let settled = false;

                        const timer = setTimeout(() => {
                            if (!settled) {
                                settled = true;
                                controller.abort();
                                resolve({ 
                                    success: false, 
                                    time: null, 
                                    method: 'fetch',
                                    error: 'timeout'
                                });
                            }
                        }, this.methodTimeout);

                        // 请求 favicon.ico 或根路径，避免404污染日志
                        const baseUrl = this.getBaseUrl(url);
                        if (!baseUrl) {
                            clearTimeout(timer);
                            resolve({ success: false, time: null, method: 'fetch', error: 'invalid_url' });
                            return;
                        }
                        
                        const testUrl = `${baseUrl}/favicon.ico?_cb=${Date.now()}`;
                        
                        fetch(testUrl, {
                            method: 'HEAD',
                            cache: 'no-store',
                            signal: signal
                        }).then((response) => {
                            if (!settled) {
                                settled = true;
                                clearTimeout(timer);
                                // 只要收到响应（任何状态码）就算站点可达
                                resolve({
                                    success: true,
                                    time: performance.now() - startTime,
                                    method: 'fetch',
                                    status: response.status,
                                    ok: response.ok
                                });
                            }
                        }).catch((err) => {
                            if (!settled) {
                                settled = true;
                                clearTimeout(timer);
                                resolve({ 
                                    success: false, 
                                    time: null, 
                                    method: 'fetch',
                                    error: err.message || 'network_error'
                                });
                            }
                        });
                    });
                }

                // 4. 备用的 Script 探测（某些特殊环境）
                testWithScript(url) {
                    return new Promise((resolve) => {
                        const script = document.createElement('script');
                        let settled = false;
                        const startTime = performance.now();

                        const timer = setTimeout(() => {
                            if (!settled) {
                                settled = true;
                                cleanup();
                                resolve({ success: false, time: null, method: 'script', error: 'timeout' });
                            }
                        }, this.methodTimeout);

                        const cleanup = () => {
                            script.onload = script.onerror = null;
                            if (script.parentNode) script.parentNode.removeChild(script);
                        };

                        script.onload = () => {
                            if (!settled) {
                                settled = true;
                                clearTimeout(timer);
                                cleanup();
                                resolve({ 
                                    success: true, 
                                    time: performance.now() - startTime, 
                                    method: 'script' 
                                });
                            }
                        };

                        script.onerror = () => {
                            if (!settled) {
                                settled = true;
                                clearTimeout(timer);
                                cleanup();
                                resolve({ 
                                    success: false, 
                                    time: null, 
                                    method: 'script',
                                    error: 'load_failed'
                                });
                            }
                        };

                        const baseUrl = this.getBaseUrl(url);
                        if (baseUrl) {
                            script.src = `${baseUrl}/__probe_${Date.now()}.js`;
                            document.head.appendChild(script);
                        } else {
                            clearTimeout(timer);
                            resolve({ success: false, time: null, method: 'script', error: 'invalid_url' });
                        }
                    });
                }

                /**
                 * 对单个站点执行多方法顺序探测（一旦成功立即返回）
                 * 探测顺序: fetch → prefetch → image → script
                 * fetch 最精确优先，prefetch 备选，image/script 兜底
                 */
                async probeSingleSite(url) {
                    const methods = [
                        { name: 'fetch', fn: () => this.testWithFetch(url) },
                        { name: 'prefetch', fn: () => this.testWithPrefetch(url) },
                        { name: 'image', fn: () => this.testWithImage(url) },
                        { name: 'script', fn: () => this.testWithScript(url) }
                    ];

                    for (const method of methods) {
                        const result = await method.fn();
                        if (result.success) {
                            logger.log(`[✓] ${url} 可达 (${Math.round(result.time)}ms) [${method.name}]`);
                            return { success: true, time: result.time, method: method.name, status: result.status };
                        }
                        logger.log(`[↻] ${url} ${method.name} 失败，切换下一方法`);
                    }
                    logger.warn(`[✗] ${url} 不可达 (所有探测方法均失败)`);
                    return { success: false, time: null, method: 'none' };
                }

                async checkAll() {
                    logger.log(`[探测启动] 目标站点数: ${this.websites.length}, 每方法超时: ${this.methodTimeout}ms`);
                    const startGlobal = performance.now();

                    // 并发探测所有站点（每个站点内部顺序执行多种方法）
                    const probeTasks = this.websites.map(url => this.probeSingleSite(url));
                    const results = await Promise.all(probeTasks);

                    const successList = [];
                    for (let idx = 0; idx < this.websites.length; idx++) {
                        const res = results[idx];
                        if (res.success) {
                            successList.push({
                                url: this.websites[idx],
                                time: res.time,
                                method: res.method,
                                status: res.status
                            });
                        }
                    }

                    this.availableWebsites = successList.sort((a, b) => a.time - b.time);

                    const elapsed = Math.round(performance.now() - startGlobal);
                    logger.log(`[检测完成] 总耗时 ${elapsed}ms | 总计:${this.websites.length} 可用:${this.availableWebsites.length}`);

                    if (this.availableWebsites.length === 0) {
                        logger.warn('[警告] 所有站点均不可达，将触发最终回退跳转');
                    } else {
                        logger.log('[可用站点列表] (按响应速度排序):');
                        this.availableWebsites.forEach((item, idx) => {
                            logger.log(`  ${idx+1}. ${item.url} (${Math.round(item.time)}ms) [${item.method}]`);
                        });
                        const best = this.availableWebsites[0];
                        logger.log(`[最佳站点] ${best.url} (${Math.round(best.time)}ms) 通过 ${best.method} 方法验证`);
                    }
                    return this.availableWebsites;
                }

                getBestWebsiteUrl() {
                    return this.availableWebsites.length ? this.availableWebsites[0].url : null;
                }

                getBestWebsiteInfo() {
                    return this.availableWebsites.length ? this.availableWebsites[0] : null;
                }

                redirectToBest() {
                    const bestInfo = this.getBestWebsiteInfo();
                    if (!bestInfo) return false;
                    
                    const bestUrl = bestInfo.url;
                    const currentOrigin = window.location.origin;
                    const targetOrigin = bestUrl.replace(/\/$/, '');
                    
                    if (currentOrigin === targetOrigin) {
                        logger.log('[跳过] 当前已是最佳站点');
                        return false;
                    }
                    
                    // 保留当前路径、查询参数和哈希
                    const fullPath = bestUrl + window.location.pathname + window.location.search + window.location.hash;
                    logger.log(`[自动跳转] 重定向至: ${fullPath} (响应时间: ${Math.round(bestInfo.time)}ms)`);
                    setTimeout(() => window.location.href = fullPath, REDIRECT_DELAY_MS);
                    return true;
                }

                redirectToFallback() {
                    if (!FALLBACK_URL) return false;
                    if (window.location.href.startsWith(FALLBACK_URL)) {
                        logger.log('[最终回退] 当前已在备用网址');
                        return false;
                    }
                    logger.log(`[最终回退] 所有站点不可达，跳转至: ${FALLBACK_URL}`);
                    setTimeout(() => window.location.href = FALLBACK_URL, REDIRECT_DELAY_MS);
                    return true;
                }
            }

            // 执行入口
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', runRobustDetection);
            } else {
                runRobustDetection();
            }

            async function runRobustDetection() {
                const checker = new RobustAvailabilityChecker(TARGET_WEBSITES, METHOD_TIMEOUT_MS);
                await checker.checkAll();

                // 暴露结果到全局，方便调试
                window.__availabilityReport = {
                    best: checker.getBestWebsiteUrl(),
                    bestInfo: checker.getBestWebsiteInfo(),
                    availableList: checker.availableWebsites,
                    timestamp: Date.now(),
                    fallbackUrl: FALLBACK_URL
                };

                if (AUTO_REDIRECT) {
                    const best = checker.getBestWebsiteUrl();
                    if (best) {
                        const currentOrigin = window.location.origin;
                        const targetOrigin = best.replace(/\/$/, '');
                        if (currentOrigin !== targetOrigin) {
                            checker.redirectToBest();
                        } else {
                            logger.log('[自动重定向] 当前已是最优站点');
                        }
                    } else {
                        logger.log('[自动重定向] 无可用站点，触发最终回退');
                        checker.redirectToFallback();
                    }
                } else {
                    const bestInfo = checker.getBestWebsiteInfo();
                    if (bestInfo) {
                        logger.log(`[手动模式] 最佳站点: ${bestInfo.url} (${Math.round(bestInfo.time)}ms)`);
                    } else {
                        logger.log(`[手动模式] 无可用站点，可手动访问: ${FALLBACK_URL}`);
                    }
                }
            }

            // 暴露简易 API 供外部调用
            window.RobustProbe = {
                check: (websites, timeoutMs) => {
                    const c = new RobustAvailabilityChecker(websites, timeoutMs);
                    return c.checkAll().then(() => ({
                        best: c.getBestWebsiteUrl(),
                        bestInfo: c.getBestWebsiteInfo(),
                        allAvailable: c.availableWebsites
                    }));
                },
                // 获取当前配置
                config: {
                    targetWebsites: TARGET_WEBSITES,
                    methodTimeout: METHOD_TIMEOUT_MS,
                    autoRedirect: AUTO_REDIRECT,
                    fallbackUrl: FALLBACK_URL
                }
            };
        })();
    </script>
</body>
</html>
